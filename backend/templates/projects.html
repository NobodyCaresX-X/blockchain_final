<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目列表 - 区块链众筹系统</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
</head>
<body>
  <div class="bg-orb bg-orb-a"></div>
  <div class="bg-orb bg-orb-b"></div>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-brand">
      <span class="nav-logo">⛓️</span>
      <a href="/">区块链众筹</a>
    </div>
    <div class="nav-links">
      <a href="/" class="nav-link">首页</a>
      <a href="/projects" class="nav-link active">项目列表</a>
      <a href="/create" class="nav-link">创建项目</a>
      <a href="/my" class="nav-link">我的参与</a>
    </div>
    <div class="nav-status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">连接中...</span>
    </div>
    <div class="nav-user" id="userInfo">
      <a href="/login" class="btn-secondary btn-sm">登录</a>
      <a href="/register" class="btn-primary btn-sm">注册</a>
    </div>
  </nav>

  <!-- 项目列表页 -->
  <main class="page">
    <section class="page-header">
      <h1>众筹项目列表</h1>
      <p class="lead">浏览所有众筹项目，选择您支持的项目进行捐赠</p>
    </section>

    <!-- 筛选器 -->
    <div class="filter-bar">
      <div class="filter-group">
        <label>状态筛选：</label>
        <select id="statusFilter" class="dark-select">
          <option value="all">全部</option>
          <option value="Active" selected>进行中</option>
          <option value="Successful">已完成</option>
          <option value="Failed">已失效</option>
        </select>
      </div>
      <button id="refreshBtn" class="btn-secondary">🔄 刷新</button>
    </div>

    <!-- 项目卡片列表 -->
    <section class="projects-grid" id="projectsContainer">
      <div class="loading">加载中...</div>
    </section>
  </main>

  <!-- 项目详情模态框 -->
  <div class="modal" id="projectModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- 支持模态框 -->
  <div class="modal" id="donateModal">
    <div class="modal-content modal-small">
      <button class="modal-close" onclick="closeDonateModal()">×</button>
      <h3>💝 向项目支持</h3>
      <form id="donateForm">
        <input type="hidden" name="projectId" id="donateProjectId">
        <div class="form-group">
          <label>支持金额 (ETH)</label>
          <input name="amountEth" type="number" step="0.01" min="0.01" value="1" required>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">确认支持</button>
          <button type="button" class="btn-secondary" onclick="closeDonateModal()">取消</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 长期支持模态框 -->
  <div class="modal" id="monthlySupportModal">
    <div class="modal-content modal-small">
      <button class="modal-close" onclick="closeMonthlySupportModal()">×</button>
      <h3>🌊 长期支持</h3>
      <div id="monthlySupportInfo"></div>
      <form id="monthlySupportForm" style="margin-top:15px;">
        <input type="hidden" name="projectId" id="monthlySupportProjectId">
        <div class="form-group">
          <label>每月支持金额 (ETH)</label>
          <input name="monthlyAmountEth" type="number" step="0.01" min="0.01" value="0.1" required>
          <small>每月1日0:0:00自动扣款，首次立即执行</small>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">开启长期支持</button>
          <button type="button" class="btn-secondary" onclick="stopMonthlySupport()">停止支持</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script>
    initProjectsPage();
  </script>
</body>
</html>
